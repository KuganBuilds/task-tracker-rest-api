spring.application.name=TaskTracker

#===PostgreSQL (Supabase/Render) Connection===#
# Prefer env vars in Render; local fallback uses the Supabase host.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db.ekwakordrwnmbxjkuvxu.supabase.co:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

#===JPA/Hibernate behavior ===#
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Render provides PORT; use 8080 for local fallback.
server.port=${PORT:8080}

#===SQL---visibility===#
spring.jpa.show-sql=true
